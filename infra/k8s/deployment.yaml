# deployment.yaml — Owner: Member 5
# One Deployment per inbound channel (4 consumers) + 1 webhook deployment for FastAPI.
# Each consumer pod forwards Kafka messages to the webhook via HTTP POST.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-nemo-webhook
  labels:
    app: agent-nemo
    component: webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-nemo
      component: webhook
  template:
    metadata:
      labels:
        app: agent-nemo
        component: webhook
    spec:
      containers:
        - name: webhook
          image: agent-nemo-customer-support:latest
          command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-nemo-config
            - secretRef:
                name: agent-nemo-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-nemo-webchat-consumer
  labels:
    app: agent-nemo
    channel: web_chat
    component: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-nemo
      channel: web_chat
      component: consumer
  template:
    metadata:
      labels:
        app: agent-nemo
        channel: web_chat
        component: consumer
    spec:
      containers:
        - name: consumer
          image: agent-nemo-customer-support:latest
          command: ["python", "-m", "infra.kafka_config", "--channel", "web_chat"]
          envFrom:
            - configMapRef:
                name: agent-nemo-config
            - secretRef:
                name: agent-nemo-secrets
          livenessProbe:
            exec:
              command: ["python", "-c", "import os; assert os.environ.get('KAFKA_BOOTSTRAP_SERVERS')"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
