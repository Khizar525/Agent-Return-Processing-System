# hpa.yaml — Owner: Member 5
# Horizontal Pod Autoscaler — scales each channel deployment based on
# Kafka consumer lag (queue depth). Target: < 100 messages per pod.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent01-webchat-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent01-webchat
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: kafka_consumer_lag
          selector:
            matchLabels:
              topic: agent01.webchat
        target:
          type: AverageValue
          averageValue: "100"
---
