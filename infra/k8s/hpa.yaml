# hpa.yaml — Owner: Member 5
# Horizontal Pod Autoscaler — scales each channel consumer deployment based on
# Kafka consumer lag (queue depth). Target: < 100 messages per pod.
# Also scales the webhook deployment on CPU utilization.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-nemo-webhook-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-nemo-webhook
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-nemo-webchat-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-nemo-webchat-consumer
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: kafka_consumer_lag
          selector:
            matchLabels:
              topic: agent-nemo.webchat
        target:
          type: AverageValue
          averageValue: "100"
---
